version: 2

project_name: obs-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: obs-cli
    binary: obs-cli
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=vendor
    ldflags:
      - -s -w -X github.com/andy-neoaira/obs-cli/cmd.ldflagsVersion={{.Version}}

# macOS Universal Binary（将 amd64 + arm64 合并为一个通用二进制）
universal_binaries:
  - replace: true

release:
  prerelease: auto
  # 自动生成 Release 说明，按 commit 分组
  mode: replace
  footer: |
    ## Installation

    Download the appropriate archive for your platform from the assets below,
    extract it, and place the `obs-cli` binary in a directory on your `PATH`.

    For more details, see the [Installation Guide](https://github.com/andy-neoaira/obs-cli#install).

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore(deps)"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Improvements
      regexp: "^improve|^refactor|^perf"
      order: 2
    - title: Others
      order: 999

checksum:
  name_template: "checksums.txt"
